name: CI/CD Pipeline

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    # Uklonjena matrix strategija, radimo direktno
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
      SERVICE_DIR: product-catalog-service
      MONGODB_DB_NAME: "test_db"
      MONGODB_URI: "mongodb://localhost:27017"
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd ${{ env.SERVICE_DIR }}
          pip install -r requirements.txt
          pip install httpx # Dodato jer je potrebno za TestClient u funkcionalnom testu

      - name: Run unit tests
        run: |
          cd ${{ env.SERVICE_DIR }}
          python -m unittest discover -s tests -p 'test_unit.py'

      - name: Run integration tests
        run: |
          cd ${{ env.SERVICE_DIR }}
          python -m unittest discover -s tests -p 'test_integration.py'

      - name: Run functional tests
        run: |
          cd ${{ env.SERVICE_DIR }}
          python -m unittest discover -s tests -p 'test_functional.py'

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ env.SERVICE_DIR }}:latest ${{ env.SERVICE_DIR }}

      - name: Push Docker image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ env.SERVICE_DIR }}:latest